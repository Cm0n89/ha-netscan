<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NetScan">
<meta name="theme-color" content="#080c0f">
<title>NET::SCAN // Network Monitor</title>
<style>
  :root {
    --bg:       #080c0f;
    --bg2:      #0d1418;
    --panel:    #0f1c24;
    --border:   #1e3a4a;
    --accent:   #00d4ff;
    --accent2:  #00ff9d;
    --accent3:  #ff6b35;
    --warn:     #ffcc00;
    --text:     #c8dde8;
    --dim:      #5a7a8a;
    --mono:     'Consolas', 'Courier New', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }

  /* Header */
  .header { background: var(--panel); border-bottom: 2px solid var(--accent); padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .logo { font-family: var(--mono); font-size: 20px; color: var(--accent); font-weight: bold; }
  .logo span { color: var(--dim); }
  .hdr-meta { font-family: var(--mono); font-size: 11px; color: var(--dim); text-align: right; }
  .live { color: var(--accent2); }

  /* Toolbar */
  .toolbar { background: var(--bg2); padding: 8px 12px; display: flex;
             align-items: center; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .btn { font-family: var(--mono); font-size: 11px; padding: 6px 14px; border: 1px solid;
         background: transparent; cursor: pointer; letter-spacing: 0.1em; transition: all 0.15s; white-space: nowrap; }
  .btn-scan  { border-color: var(--accent2); color: var(--accent2); }
  .btn-scan:hover:not(:disabled)  { background: var(--accent2); color: var(--bg); }
  .btn-scan:disabled { opacity: 0.5; cursor: wait; }
  .btn-fetch-all { border-color: var(--accent); color: var(--accent); }
  .btn-fetch-all:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
  .btn-fetch-all:disabled { opacity: 0.5; cursor: wait; }
  .label { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.15em; }
  .seg-input { font-family: var(--mono); font-size: 12px; background: var(--bg);
               border: 1px solid #2a5a72; color: var(--accent); padding: 5px 8px; outline: none; width: 160px; }
  .seg-input:focus { border-color: var(--accent); }

  /* Scan method toggle */
  .method-btn { font-family: var(--mono); font-size: 10px; padding: 5px 10px;
                border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; }
  .method-btn.active { background: rgba(0,255,157,0.1); border-color: var(--accent2); color: var(--accent2); }

  /* Progress */
  .progress { display: none; background: var(--bg); border-bottom: 1px solid var(--border);
              padding: 6px 12px; max-height: 100px; overflow-y: auto; }
  .progress.open { display: block; }
  .prog-line { font-family: var(--mono); font-size: 11px; color: var(--dim); line-height: 1.8; }
  .prog-line.ok  { color: var(--accent2); }
  .prog-line.err { color: var(--accent3); }

  /* Stats */
  .stats { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .dot-stat { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-stat.green  { background: var(--accent2); box-shadow: 0 0 5px rgba(0,255,157,0.6); }
  .dot-stat.orange { background: var(--accent3); }
  .dot-stat.blue   { background: var(--accent); }
  .stat-val { font-family: var(--mono); font-size: 16px; color: #eef6fa; }
  .stat-lbl { font-family: var(--mono); font-size: 9px; color: var(--dim); letter-spacing: 0.15em; display: block; }

  /* Search */
  .search-bar { background: var(--bg); padding: 6px 12px; border-bottom: 1px solid var(--border);
                display: flex; align-items: center; gap: 8px; }
  .search-input { flex: 1; font-family: var(--mono); font-size: 12px; background: var(--bg2);
                  border: 1px solid var(--border); color: var(--text); padding: 6px 10px; outline: none; }
  .search-input:focus { border-color: #2a5a72; }
  .search-input::placeholder { color: var(--dim); }
  .clear-btn { font-family: var(--mono); font-size: 12px; background: transparent; border: none;
               color: var(--dim); cursor: pointer; padding: 4px 8px; }
  .clear-btn:hover { color: var(--text); }

  /* Table */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #111a20; border-bottom: 2px solid #2a5a72; }
  th { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--dim);
       text-transform: uppercase; padding: 10px 12px; text-align: left;
       white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--accent); }
  tbody tr { border-bottom: 1px solid rgba(30,58,74,0.5); transition: background 0.1s; }
  tbody tr:hover { background: rgba(0,212,255,0.03); }
  tbody tr.offline { opacity: 0.45; }
  tbody tr.commented { background: rgba(0,255,157,0.03); }
  td { padding: 9px 12px; vertical-align: middle; }

  .td-status { width: 28px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot.on      { background: var(--accent2); box-shadow: 0 0 5px rgba(0,255,157,0.6); }
  .dot.warn    { background: var(--warn); box-shadow: 0 0 5px rgba(255,204,0,0.5); }
  .dot.off     { background: var(--accent3); box-shadow: 0 0 5px rgba(255,107,53,0.5); }
  .action-btns { display: flex; gap: 4px; align-items: center; }
  .btn-rescan  { font-family: var(--mono); font-size: 9px; padding: 2px 6px;
                  border: 1px solid var(--warn); background: transparent;
                  color: var(--warn); cursor: pointer; white-space: nowrap; }
  .btn-rescan:hover { background: var(--warn); color: var(--bg); }
  .btn-remove  { font-family: var(--mono); font-size: 9px; padding: 2px 6px;
                  border: 1px solid var(--accent3); background: transparent;
                  color: var(--accent3); cursor: pointer; white-space: nowrap; }
  .btn-remove:hover { background: var(--accent3); color: var(--bg); }
  tbody tr.offline-warn { background: rgba(255,204,0,0.03); }
  tbody tr.offline-crit { background: rgba(255,107,53,0.05); }

  .td-ip { font-family: var(--mono); font-size: 12px; white-space: nowrap; }
  .ip-link { color: var(--accent); text-decoration: none; border-bottom: 1px dashed rgba(0,212,255,0.3); }
  .ip-link:hover { color: #fff; }

  .name-badge { display: inline-block; padding: 2px 7px;
                border: 1px solid rgba(0,255,157,0.3); background: rgba(0,255,157,0.05);
                font-size: 12px; color: var(--accent2); font-weight: 600; }
  .fetch-btn { font-family: var(--mono); font-size: 10px; padding: 2px 7px;
               border: 1px dashed #2a5a72; background: transparent; color: var(--dim); cursor: pointer; white-space: nowrap; }
  .fetch-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .fetch-btn.loading { opacity: 0.5; cursor: wait; }

  .vendor-badge { font-family: var(--mono); font-size: 10px; padding: 2px 6px;
                  border: 1px solid #2a5a72; color: var(--text); background: rgba(255,255,255,0.02); white-space: nowrap; }
  .vendor-badge.unknown { border-color: var(--border); color: var(--dim); }

  .td-mac  { font-family: var(--mono); font-size: 10px; color: var(--dim); white-space: nowrap; }
  .td-host { font-family: var(--mono); font-size: 11px; }
  .td-host.empty { color: var(--dim); }

  .comment-input { background: transparent; border: none; border-bottom: 1px solid transparent;
                   color: var(--text); font-family: 'Segoe UI',sans-serif; font-size: 13px;
                   padding: 2px; outline: none; width: 100%; min-width: 120px; transition: border-color 0.2s; }
  .comment-input:hover { border-bottom-color: #2a5a72; }
  .comment-input:focus { border-bottom-color: var(--accent2); }
  .comment-input::placeholder { color: var(--dim); font-style: italic; opacity: 0.6; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--panel);
           border: 1px solid var(--accent2); color: var(--accent2); font-family: var(--mono);
           font-size: 12px; padding: 10px 16px; opacity: 0; transition: opacity 0.3s;
           pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #2a5a72; }

  /* Mobile */
  @media (max-width: 600px) {
    th:nth-child(6), td:nth-child(6),
    th:nth-child(7), td:nth-child(7) { display: none; }
    .hdr-meta { display: none; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">NET<span>::</span>SCAN</div>
  <div class="hdr-meta">
    <div><span id="lbl-last-scan">SENASTE SCAN</span>: <span id="lastScan" style="color:var(--text)">—</span></div>
    <div>STATUS: <span id="scanStatus" class="live">● IDLE</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:0;margin-left:12px">
    <button class="method-btn active" id="langSv" onclick="setLang('sv')">SV</button>
    <button class="method-btn" id="langEn" onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button id="btnScan" class="btn btn-scan">⟳ SCAN NOW</button>
  <button id="btnFetchAll" class="btn btn-fetch-all" title="Fetch device names for all unnamed devices">⟳ FETCH ALL NAMES</button>
  <span class="label" id="lbl-segment">SEGMENT</span>
  <input id="segInput" class="seg-input" placeholder="192.168.1.0/24" />
  <span class="label" id="lbl-method">METOD</span>
  <div style="display:flex">
    <button class="method-btn active" id="methodNmap" onclick="setMethod('nmap')">nmap</button>
    <button class="method-btn" id="methodPython" onclick="setMethod('python')">python</button>
  </div>
  <span id="nmapStatus" style="font-family:var(--mono);font-size:10px;color:var(--dim)"></span>
</div>

<!-- Progress -->
<div id="progress" class="progress"></div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><div class="dot-stat green"></div>
    <div><div class="stat-val" id="statOnline">0</div><div class="stat-lbl">ONLINE</div></div></div>
  <div class="stat"><div class="dot-stat orange"></div>
    <div><div class="stat-val" id="statOffline">0</div><div class="stat-lbl">OFFLINE</div></div></div>
  <div class="stat"><div class="dot-stat blue"></div>
    <div><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">TOTALT</div></div></div>
</div>

<!-- Search -->
<div class="search-bar">
  <span class="label" id="lbl-search">SÖK</span>
  <input id="searchInput" class="search-input" placeholder="IP, name, vendor, MAC, comment…" />
  <button class="clear-btn" onclick="clearSearch()">✕</button>
</div>

<!-- Table -->
<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th></th>
        <th onclick="sortBy('ip')">IP-ADRESS ↕</th>
        <th onclick="sortBy('device_name')">ENHETSNAMN ↕</th>
        <th data-key="comment">COMMENT</th>
        <th onclick="sortBy('vendor')">VENDOR ↕</th>
        <th onclick="sortBy('hostname')">HOSTNAME ↕</th>
        <th onclick="sortBy('mac')">MAC-ADRESS ↕</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr id="loadingMsg">
        <td colspan="7" style="text-align:center;padding:40px;font-family:monospace;color:var(--dim);letter-spacing:0.1em">
          <div>⟳ Loading…</div>
          <button id="loadDataBtn" onclick="loadData()" style="display:none;margin-top:16px;font-family:monospace;font-size:12px;padding:8px 20px;border:1px solid #00d4ff;background:transparent;color:#00d4ff;cursor:pointer;letter-spacing:0.1em">
            ⟳ LOAD DATA
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div id="toast" class="toast"></div>

<script>
  // ── i18n ─────────────────────────────────────────────────────────────────────
  const T = {
    sv: {
      scanNow:        '⟳ SCANNA NU',
      scanning:       '⟳ SCANNAR…',
      fetchAll:       '⟳ HÄMTA ALLA NAMN',
      segment:        'SEGMENT',
      method:         'METOD',
      search:         'SÖK',
      searchPh:       'IP, namn, vendor, MAC, kommentar…',
      online:         'ONLINE',
      offline:        'OFFLINE',
      total:          'TOTALT',
      lastScan:       'SENASTE SCAN',
      colStatus:      '',
      colIp:          'IP-ADRESS ↕',
      colName:        'ENHETSNAMN ↕',
      colComment:     'KOMMENTAR',
      colVendor:      'VENDOR ↕',
      colHostname:    'HOSTNAME ↕',
      colMac:         'MAC-ADRESS ↕',
      commentPh:      'Lägg till kommentar…',
      fetchBtn:       '⟳ Hämta',
      fetching:       '⟳ hämtar…',
      fetched:        (n) => '✓ "' + n + '" hämtat och sparat',
      noName:         (ip) => '⚠ Inget namn för ' + ip,
      fetchAllDone:   (f,t) => '✓ ' + f + ' namn hittade av ' + t + ' enheter',
      allHaveNames:   'Alla enheter har redan ett namn',
      scanDone:       '✓ Scan klar',
      scanFailed:     '⚠ Scan misslyckades',
      removed:        (ip) => '✓ ' + ip + ' borttagen',
      confirmRemove:  (ip) => 'Ta bort ' + ip + ' från listan?',
      onlineAgain:    (ip) => '✓ ' + ip + ' är online igen!',
      stillOffline:   (ip) => ip + ' svarar fortfarande inte',
      tipOnline:      'Online',
      tipWarn:        (n) => 'Offline ' + n + ' scan(s)',
      tipCrit:        (n) => 'Offline ' + n + ' scanningar',
      nmapFound:      '✓ nmap',
      nmapMissing:    '✗ nmap',
    },
    en: {
      scanNow:        '⟳ SCAN NOW',
      scanning:       '⟳ SCANNING…',
      fetchAll:       '⟳ FETCH ALL NAMES',
      segment:        'SEGMENT',
      method:         'METHOD',
      search:         'SEARCH',
      searchPh:       'IP, name, vendor, MAC, comment…',
      online:         'ONLINE',
      offline:        'OFFLINE',
      total:          'TOTAL',
      lastScan:       'LAST SCAN',
      colStatus:      '',
      colIp:          'IP ADDRESS ↕',
      colName:        'DEVICE NAME ↕',
      colComment:     'COMMENT',
      colVendor:      'VENDOR ↕',
      colHostname:    'HOSTNAME ↕',
      colMac:         'MAC ADDRESS ↕',
      commentPh:      'Add a comment…',
      fetchBtn:       '⟳ Fetch',
      fetching:       '⟳ fetching…',
      fetched:        (n) => '✓ "' + n + '" fetched and saved',
      noName:         (ip) => '⚠ No name found for ' + ip,
      fetchAllDone:   (f,t) => '✓ ' + f + ' names found out of ' + t + ' devices',
      allHaveNames:   'All devices already have a name',
      scanDone:       '✓ Scan complete',
      scanFailed:     '⚠ Scan failed',
      removed:        (ip) => '✓ ' + ip + ' removed',
      confirmRemove:  (ip) => 'Remove ' + ip + ' from the list?',
      onlineAgain:    (ip) => '✓ ' + ip + ' is online again!',
      stillOffline:   (ip) => ip + ' still not responding',
      tipOnline:      'Online',
      tipWarn:        (n) => 'Offline ' + n + ' scan(s)',
      tipCrit:        (n) => 'Offline ' + n + ' scans',
      nmapFound:      '✓ nmap',
      nmapMissing:    '✗ nmap',
    }
  };
  let lang = localStorage.getItem('netscan_lang') || 'en';
  let t = T[lang];

  function setLang(l) {
    lang = l; t = T[l];
    localStorage.setItem('netscan_lang', l);
    document.getElementById('langSv').classList.toggle('active', l === 'sv');
    document.getElementById('langEn').classList.toggle('active', l === 'en');
    applyTranslations();
    renderTable();
  }

  function applyTranslations() {
    document.getElementById('btnScan').textContent    = t.scanNow;
    document.getElementById('btnFetchAll').textContent= t.fetchAll;
    document.getElementById('lbl-segment').textContent= t.segment;
    document.getElementById('lbl-method').textContent = t.method;
    document.getElementById('lbl-search').textContent = t.search;
    document.getElementById('lbl-last-scan').textContent = t.lastScan;
    document.getElementById('searchInput').placeholder = t.searchPh;
    document.getElementById('statOnlineLbl').textContent  = t.online;
    document.getElementById('statOfflineLbl').textContent = t.offline;
    document.getElementById('statTotalLbl').textContent   = t.total;
    document.getElementById('nmapStatus').textContent =
      document.getElementById('nmapStatus').dataset.found === 'true' ? t.nmapFound : t.nmapMissing;
    // Table headers
    const ths = document.querySelectorAll('th[data-key]');
    const keys = ['ip','device_name','comment','vendor','hostname','mac'];
    const lbls = [t.colIp,t.colName,t.colComment,t.colVendor,t.colHostname,t.colMac];
    ths.forEach((th,i) => { if(lbls[i]) th.textContent = lbls[i]; });
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let devices     = [];
  let comments    = {};
  let sortKey     = 'ip';
  let sortRev     = false;
  let search      = '';
  let scanMethod        = 'nmap';
  let offlineThreshold  = 5;
  let lastMtime   = null;
  let lastScanTime = null;
  let commentTimers = {};
  let scanPollTimer = null;
  let lastLines   = 0;

  // ── Boot ───────────────────────────────────────────────────────────────────
  document.getElementById('btnScan').addEventListener('click', triggerScan);
  document.getElementById('btnFetchAll').addEventListener('click', fetchAllNames);
  document.getElementById('searchInput').addEventListener('input', e => {
    search = e.target.value.toLowerCase();
    renderTable();
  });

  // Load local network
  fetch(apiUrl('api/local_ip')).then(r => r.json()).then(d => {
    if (d.network) document.getElementById('segInput').value = d.network;
  }).catch(() => {});

  // Detect nmap
  fetch(apiUrl('api/scan/detect')).then(r => r.json()).then(d => {
    const el = document.getElementById('nmapStatus');
    if (d.available) {
      el.textContent = '✓ nmap'; el.style.color = 'var(--accent2)';
    } else {
      el.textContent = '✗ nmap'; el.style.color = 'var(--accent3)';
      setMethod('python');
    }
  }).catch(() => {});

  // Apply saved language
  setLang(lang);

  // Load existing data immediately on page open
  loadData();
  // Show manual reload button if still empty after 4 seconds
  setTimeout(() => {
    if (devices.length === 0) {
      const btn = document.getElementById('loadDataBtn');
      if (btn) btn.style.display = 'inline-block';
    }
  }, 4000);
  // Then keep polling every 5 seconds for updates
  setInterval(poll, 5000);
  // Check for new version every 30 seconds — auto-reload if updated
  setInterval(checkVersion, 30000);

  // ── Polling ────────────────────────────────────────────────────────────────
  async function checkVersion() {
    try {
      const resp = await fetch(apiUrl('api/version'), { cache: 'no-store' });
      if (!resp.ok) return;
      const data = await resp.json();
      const serverVersion = data.version || '';
      const clientVersion = document.querySelector('meta[name="app-version"]')?.content || '';
      if (serverVersion && clientVersion && serverVersion !== clientVersion) {
        console.log('New version detected:', serverVersion, '- reloading');
        window.location.reload(true);
      }
    } catch {}
  }

    async function loadData() {
    // Simple direct load — no mtime checks, always renders
    try {
      const [scanResp, commentResp] = await Promise.all([
        fetch(apiUrl('api/scan_results'), { cache: 'no-store' }),
        fetch(apiUrl('api/comments'),     { cache: 'no-store' }),
      ]);

      if (scanResp.ok) {
        const data = await scanResp.json();
        if (data && Array.isArray(data.devices)) {
          devices      = data.devices;
          lastScanTime = data.scan_time || null;
          if (data.offline_threshold) offlineThreshold = data.offline_threshold;
          if (data.scan_time) {
            document.getElementById('lastScan').textContent =
              new Date(data.scan_time).toLocaleString('sv-SE');
          }
        }
      }

      if (commentResp.ok) {
        const ct = await commentResp.text();
        try { comments = ct ? JSON.parse(ct) : {}; } catch {}
      }

      // Hide loading message
      const loadingEl = document.getElementById('loadingMsg');
      if (loadingEl) loadingEl.style.display = 'none';

      renderTable();
    } catch(e) {
      console.error('loadData failed:', e);
    }
  }

  async function poll() {
    try {
      const resp = await fetch(apiUrl('api/scan_results'), { cache: 'no-store' });
      if (!resp.ok) return;
      const lastMod = resp.headers.get('Last-Modified');
      const mtime   = lastMod ? new Date(lastMod).getTime() : null;
      const text    = await resp.text();
      let data;
      try { data = JSON.parse(text); } catch(e) { return; }
      if (!data || !Array.isArray(data.devices)) return;

      const changed = !mtime || !lastMtime || mtime > lastMtime ||
                      data.scan_time !== lastScanTime;
      if (!changed) return;

      lastMtime    = mtime || Date.now();
      lastScanTime = data.scan_time || null;
      devices      = data.devices;
      if (data.offline_threshold) offlineThreshold = data.offline_threshold;
      if (data.scan_time) {
        document.getElementById('lastScan').textContent =
          new Date(data.scan_time).toLocaleString('sv-SE');
      }
      try {
        const cr = await fetch(apiUrl('api/comments'), { cache: 'no-store' });
        if (cr.ok) { const ct = await cr.text(); comments = ct ? JSON.parse(ct) : {}; }
      } catch {}
      renderTable();
    } catch {}
  }

  // ── Table ──────────────────────────────────────────────────────────────────
  function renderTable() {
    const q = search;
    let list = devices.filter(d => {
      if (!q) return true;
      return [d.ip, d.mac, d.vendor, d.hostname, d.device_name, comments[d.mac] || '']
             .join(' ').toLowerCase().includes(q);
    });

    list = [...list].sort((a, b) => {
      let av = sortKey === 'ip' ? ipInt(a.ip) : (a[sortKey] || '').toLowerCase();
      let bv = sortKey === 'ip' ? ipInt(b.ip) : (b[sortKey] || '').toLowerCase();
      if (av < bv) return sortRev ? 1 : -1;
      if (av > bv) return sortRev ? -1 : 1;
      return 0;
    });

    let online = 0, offline = 0;
    devices.forEach(d => (d.offline_count || 0) === 0 ? online++ : offline++);
    document.getElementById('statOnline').textContent  = online;
    document.getElementById('statOffline').textContent = offline;
    document.getElementById('statTotal').textContent   = devices.length;

    const tbody = document.getElementById('tbody');

    // Save unsaved comment values
    tbody.querySelectorAll('.comment-input').forEach(inp => {
      const mac = inp.dataset.mac;
      if (mac && inp.value.trim()) comments[mac] = inp.value.trim();
    });

    tbody.innerHTML = list.map(d => {
      const mac      = d.mac || '';
      const offCount = d.offline_count || 0;
      const isOnline = offCount === 0;
      const isWarn   = offCount > 0 && offCount < offlineThreshold;
      const isCrit   = offCount >= offlineThreshold;
      const comment  = esc(comments[mac] || '');
      const hasName  = !!d.device_name;
      const vendor   = d.vendor || '';
      const isUnk    = !vendor || vendor === 'Unknown';
      const dotCls   = isOnline ? 'on' : (isWarn ? 'warn' : 'off');
      const rowCls   = [
        !isOnline ? (isCrit ? 'offline-crit' : 'offline-warn') : '',
        comment ? 'commented' : ''
      ].filter(Boolean).join(' ');
      const tip = isOnline ? t.tipOnline :
                  isWarn   ? t.tipWarn(offCount) :
                             t.tipCrit(offCount);

      const rescanBtn = !isOnline ? '<button class="btn-rescan" data-ip="' + d.ip + '" onclick="rescanDevice(this)">⟳</button>' : '';
      const removeBtn = isCrit    ? '<button class="btn-remove" data-ip="' + d.ip + '" onclick="removeDevice(this)">✕</button>' : '';
      const ipCell    = isOnline
        ? '<a class="ip-link" href="http://' + d.ip + '" target="_blank">' + d.ip + '</a>'
        : '<span style="color:var(--dim)">' + d.ip + '</span>';
      const nameCell  = hasName
        ? '<span class="name-badge">' + esc(d.device_name) + '</span>'
        : '<button class="fetch-btn" data-ip="' + d.ip + '" data-mac="' + mac + '" onclick="fetchName(this)">' + t.fetchBtn + '</button>';

      return '<tr class="' + rowCls + '">' +
        '<td class="td-status"><div class="action-btns">' +
          '<span class="dot ' + dotCls + '" title="' + tip + '"></span>' +
          rescanBtn + removeBtn +
        '</div></td>' +
        '<td class="td-ip">' + ipCell + '</td>' +
        '<td>' + nameCell + '</td>' +
        '<td style="min-width:150px">' +
          '<input class="comment-input" placeholder="' + t.commentPh + '"' +
          ' value="' + comment + '" data-mac="' + mac + '" data-ip="' + d.ip + '"' +
          ' oninput="commentInput(this)" onblur="saveComment(this.dataset.mac, this.value)" />' +
        '</td>' +
        '<td><span class="vendor-badge ' + (isUnk ? 'unknown' : '') + '">' + esc(vendor || 'Unknown') + '</span></td>' +
        '<td class="td-host ' + (d.hostname ? '' : 'empty') + '">' + esc(d.hostname || '—') + '</td>' +
        '<td class="td-mac">' + esc(mac) + '</td>' +
        '</tr>';
    }).join('');

  }

  // ── Scan ───────────────────────────────────────────────────────────────────
  async function triggerScan() {
    const btn  = document.getElementById('btnScan');
    const prog = document.getElementById('progress');
    const net  = document.getElementById('segInput').value.trim();

    btn.disabled = true;
    btn.textContent = t.scanning;
    prog.innerHTML  = '';
    prog.classList.add('open');
    lastLines = 0;
    setScanStatus(t.scanning, 'var(--accent3)');

    try {
      const url = apiUrl('api/scan/start') +
                  '?network=' + encodeURIComponent(net) +
                  '&method='  + encodeURIComponent(scanMethod);
      const r   = await fetch(url, { cache: 'no-store' });
      const res = await r.json();
      if (!res.ok) throw new Error(res.error || 'Misslyckades');
    } catch (e) {
      appendLog(prog, `FEL: ${e.message}`, 'err');
      scanDone(btn, prog, false); return;
    }

    scanPollTimer = setInterval(async () => {
      try {
        const sr = await fetch(apiUrl('api/scan/status'), { cache: 'no-store' });
        const s  = await sr.json();
        const lines = s.progress || [];
        for (let i = lastLines; i < lines.length; i++) {
          const l = lines[i];
          appendLog(prog, l, l.startsWith('[OK]') || l.startsWith('[+]') ? 'ok' :
                            l.startsWith('[!]') ? 'err' : '');
        }
        lastLines = lines.length;
        if (!s.running) {
          clearInterval(scanPollTimer);
          lastMtime = null; lastScanTime = null;
          await poll();
          scanDone(btn, prog, true);
        }
      } catch { clearInterval(scanPollTimer); scanDone(btn, prog, false); }
    }, 1500);
  }

  function scanDone(btn, prog, ok) {
    btn.disabled = false;
    btn.textContent = t.scanNow;
    setScanStatus(ok ? '● KLAR' : '● FEL', ok ? 'var(--accent2)' : 'var(--accent3)');
    setTimeout(() => setScanStatus('● IDLE', 'var(--accent2)'), 4000);
    showToast(ok ? t.scanDone : t.scanFailed);
  }

  function setScanStatus(text, color) {
    const el = document.getElementById('scanStatus');
    el.textContent = text; el.style.color = color || '';
  }

  function appendLog(container, text, cls) {
    const d = document.createElement('div');
    d.className = 'prog-line' + (cls ? ' ' + cls : '');
    d.textContent = text;
    container.appendChild(d);
    container.scrollTop = container.scrollHeight;
  }

  // ── Fetch all names ───────────────────────────────────────────────────────
  async function fetchAllNames() {
    const targets = devices.filter(d => !d.device_name);
    if (!targets.length) {
      showToast(t.allHaveNames); return;
    }

    const btn = document.getElementById('btnFetchAll');
    btn.disabled = true;
    btn.textContent = '⟳ 0/' + targets.length;

    let done = 0, found = 0;
    for (const d of targets) {
      try {
        const r    = await fetch(apiUrl(`api/device_name?ip=${encodeURIComponent(d.ip)}`));
        const data = await r.json();
        const name = data.name || '';
        if (name) {
          d.device_name = name;
          // Persist device_name to disk
          await persistDeviceName(d.ip, name);
          if (!comments[d.mac]) {
            comments[d.mac] = name;
            // Save via comment input blur trigger after render
          }
          found++;
        }
      } catch {}
      done++;
      btn.textContent = `⟳ ${done}/${targets.length}`;
      renderTable();
    }

    btn.disabled = false;
    btn.textContent = t.fetchAll;
    showToast(t.fetchAllDone(found, targets.length));
  }

  // ── Persist device_name to server ────────────────────────────────────────
  // Build URL relative to current page location (works under HA ingress)
  function apiUrl(path) {
    // Build URL relative to the ingress base path
    // HA ingress: window.location = /api/hassio_ingress/TOKEN/
    // We want:                       /api/hassio_ingress/TOKEN/api/scan_results
    let base = window.location.pathname;
    // Remove any file at end (e.g. index.html)
    if (base.match(/\.[a-z]+$/i)) {
      base = base.substring(0, base.lastIndexOf('/'));
    }
    // Ensure trailing slash
    if (!base.endsWith('/')) base += '/';
    return base + path;
  }

  async function apiFetch(path, options) {
    return fetch(apiUrl(path), options);
  }

  async function persistDeviceName(ip, name) {
    try {
      const url = apiUrl('api/update_device') +
                  '?ip=' + encodeURIComponent(ip) +
                  '&device_name=' + encodeURIComponent(name);
      await fetch(url, { cache: 'no-store' });
    } catch {}
  }

  // ── Rescan / Remove device ────────────────────────────────────────────────
  async function rescanDevice(btn) {
    const ip = btn.dataset.ip;
    btn.textContent = '…';
    btn.disabled = true;
    try {
      const r    = await fetch(apiUrl('api/rescan_device') + '?ip=' + encodeURIComponent(ip));
      const data = await r.json();
      if (data.online) {
        showToast(`✓ ${ip} är online igen!`);
        lastMtime = null; lastScanTime = null;
        await poll();
      } else {
        showToast(`${ip} svarar fortfarande inte`);
        btn.textContent = '⟳';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = '⟳';
      btn.disabled = false;
    }
  }

  async function removeDevice(btn) {
    const ip = btn.dataset.ip;
    if (!confirm(`Ta bort ${ip} från listan?`)) return;
    try {
      await fetch(apiUrl('api/remove_device') + '?ip=' + encodeURIComponent(ip));
      devices = devices.filter(d => d.ip !== ip);
      renderTable();
      showToast(`✓ ${ip} borttagen`);
    } catch {}
  }

  // ── Device name ────────────────────────────────────────────────────────────
  async function fetchName(btn) {
    const ip  = btn.dataset.ip;
    const mac = btn.dataset.mac;
    btn.classList.add('loading');
    btn.textContent = t.fetching;
    try {
      const r    = await fetch(apiUrl(`api/device_name?ip=${encodeURIComponent(ip)}`));
      const data = await r.json();
      const name = data.name || '';
      if (name) {
        const dev = devices.find(d => d.ip === ip);
        if (dev) dev.device_name = name;
        // Persist to disk
        await persistDeviceName(ip, name);
        if (!comments[mac]) await saveComment(mac, name);
        renderTable();
        showToast(t.fetched(name));
      } else {
        btn.classList.remove('loading');
        btn.textContent = t.fetchBtn;
        showToast(t.noName(ip));
      }
    } catch {
      btn.classList.remove('loading');
      btn.textContent = t.fetchBtn;
    }
  }

  // ── Comments ───────────────────────────────────────────────────────────────
  function commentInput(inp) {
    const mac = inp.dataset.mac;
    clearTimeout(commentTimers[mac]);
    commentTimers[mac] = setTimeout(() => saveComment(mac, inp.value), 800);
  }

  async function saveComment(mac, value) {
    if (!mac) return;
    const v = (value || '').trim();
    if (v) comments[mac] = v;
    else   delete comments[mac];
    // HA ingress strips POST body — send each comment as GET query param
    try {
      const url = apiUrl('api/save_comment') +
                  '?mac=' + encodeURIComponent(mac) +
                  '&comment=' + encodeURIComponent(v);
      await fetch(url, { cache: 'no-store' });
    } catch {}
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function sortBy(key) {
    if (sortKey === key) sortRev = !sortRev;
    else { sortKey = key; sortRev = false; }
    renderTable();
  }

  function setMethod(m) {
    scanMethod = m;
    document.getElementById('methodNmap').classList.toggle('active', m === 'nmap');
    document.getElementById('methodPython').classList.toggle('active', m === 'python');
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    search = ''; renderTable();
  }

  function ipInt(ip) {
    try { return ip.split('.').reduce((a, o) => a * 256 + parseInt(o), 0); }
    catch { return 0; }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
