name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update config.yaml version
        run: |
          sed -i "s/^version:.*/version: \"${{ steps.version.outputs.VERSION }}\"/" netscan/config.yaml

      - name: Create release archive
        run: |
          zip -r netscan-${{ steps.version.outputs.VERSION }}.zip netscan/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: netscan-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
